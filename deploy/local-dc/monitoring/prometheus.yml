global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: ceph
    static_configs:
      - targets: ['mon-01:9283', 'mon-02:9283', 'mon-03:9283']

  - job_name: ceph_rgw
    static_configs:
      - targets: ['rgw-01:9114', 'rgw-02:9114', 'rgw-03:9114']

  - job_name: zkof_gateway
    metrics_path: /internal/metrics
    static_configs:
      - targets:
          - 'gw-01.local:8081'
          - 'gw-02.local:8081'
          - 'gw-03.local:8081'

  - job_name: node_exporter
    static_configs:
      - targets:
          - 'osd-01:9100'
          - 'osd-02:9100'
          - 'osd-03:9100'
          - 'osd-04:9100'
          - 'osd-05:9100'
          - 'osd-06:9100'
