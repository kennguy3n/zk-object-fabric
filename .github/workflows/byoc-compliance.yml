name: byoc-compliance

# Nightly S3 compliance suite against the three BYOC adapters
# (Backblaze B2, Cloudflare R2, AWS S3). Each job is gated on its
# provider-specific secrets so forks and unconfigured environments
# stay green; the matching TestSuite_* helpers self-skip when env
# is unset.

on:
  workflow_dispatch:
  schedule:
    # 03:33 UTC nightly; offset from storj-compliance.yml (03:17)
    # so the fabric's CI runners are not all hot at once.
    - cron: "33 3 * * *"

jobs:
  backblaze_b2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run Backblaze B2 compliance suite
        env:
          B2_ENDPOINT:   ${{ secrets.B2_ENDPOINT }}
          B2_BUCKET:     ${{ secrets.B2_BUCKET }}
          B2_ACCESS_KEY: ${{ secrets.B2_ACCESS_KEY }}
          B2_SECRET_KEY: ${{ secrets.B2_SECRET_KEY }}
        run: |
          if [ -z "$B2_ENDPOINT" ] || [ -z "$B2_BUCKET" ] || [ -z "$B2_ACCESS_KEY" ] || [ -z "$B2_SECRET_KEY" ]; then
            echo "B2 secrets unset; skipping."
            exit 0
          fi
          go test -v -run TestSuite_BackblazeB2 ./tests/s3_compat/ -timeout 15m

  cloudflare_r2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run Cloudflare R2 compliance suite
        env:
          R2_ENDPOINT:   ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:     ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          if [ -z "$R2_ENDPOINT" ] || [ -z "$R2_BUCKET" ] || [ -z "$R2_ACCESS_KEY" ] || [ -z "$R2_SECRET_KEY" ]; then
            echo "R2 secrets unset; skipping."
            exit 0
          fi
          go test -v -run TestSuite_CloudflareR2 ./tests/s3_compat/ -timeout 15m

  aws_s3:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run AWS S3 compliance suite
        env:
          AWS_S3_ENDPOINT:   ${{ secrets.AWS_S3_ENDPOINT }}
          AWS_S3_BUCKET:     ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
          AWS_S3_REGION:     ${{ secrets.AWS_S3_REGION }}
        run: |
          if [ -z "$AWS_S3_BUCKET" ] || [ -z "$AWS_S3_ACCESS_KEY" ] || [ -z "$AWS_S3_SECRET_KEY" ]; then
            echo "AWS S3 secrets unset; skipping."
            exit 0
          fi
          go test -v -run TestSuite_AWSS3 ./tests/s3_compat/ -timeout 15m
